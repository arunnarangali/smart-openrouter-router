name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="smart-openrouter-router-${TAG}.tar.gz"
          OUT_DIR="dist"
          mkdir -p "$OUT_DIR"
          tar -czf "$OUT_DIR/$ARCHIVE" \
            --exclude=.git \
            --exclude="$OUT_DIR" \
            --transform "s#^#smart-openrouter-router-${TAG}/#" \
            .
          (cd "$OUT_DIR" && sha256sum "$ARCHIVE" > SHA256SUMS)

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "smart-openrouter-router ${GITHUB_REF_NAME}"
          body: |
            ## Install (pinned)
            ```bash
            VER=${{ github.ref_name }}
            curl -fsSL "https://raw.githubusercontent.com/arunnarangali/smart-openrouter-router/$VER/smart-router-install.sh" \
              | SMART_ROUTER_VERSION="$VER" bash
            ```

            ## Install (latest)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/arunnarangali/smart-openrouter-router/main/smart-router-install.sh | SMART_ROUTER_VERSION=latest bash
            ```

            Checksums are included in `SHA256SUMS`.
          files: |
            dist/smart-openrouter-router-${{ github.ref_name }}.tar.gz
            dist/SHA256SUMS
